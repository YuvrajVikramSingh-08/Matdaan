name: Deploy Matdaan
on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and deploy backend
        run: |
          cd backend
          gcloud builds submit --tag gcr.io/$PROJECT_ID/matdaan-backend
          gcloud run deploy matdaan-backend \
            --image gcr.io/$PROJECT_ID/matdaan-backend \
            --region $REGION \
            --allow-unauthenticated \
            --service-account matdaan-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars NODE_ENV=production,PROJECT_ID=$PROJECT_ID \
            --min-instances 0 --max-instances 3 \
            --memory 512Mi --cpu 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and deploy frontend
        run: |
          cd frontend
          gcloud builds submit --tag gcr.io/$PROJECT_ID/matdaan-frontend
          gcloud run deploy matdaan-frontend \
            --image gcr.io/$PROJECT_ID/matdaan-frontend \
            --region $REGION \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --memory 256Mi --cpu 1
